<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBT Sentinel | Access Denied</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body {
            background: #0f172a; color: #f8fafc;
            min-height: 100vh; display:flex; align-items:center; justify-content:center;
        }
        .box {
            text-align:center;
            background: rgba(30,41,59,0.75);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 3rem 2.5rem;
            max-width: 420px;
            backdrop-filter: blur(16px);
        }
        .icon { font-size: 4rem; color:#ef4444; margin-bottom:1rem; }
        h1 { font-size: 1.75rem; font-weight:700; margin-bottom:0.5rem; }
        p { color:#94a3b8; margin-bottom:2rem; line-height:1.6; }
        a {
            background: #3b82f6; color:#fff; text-decoration:none;
            padding: 0.75rem 1.5rem; border-radius: 10px; font-weight:600;
            transition: background 0.2s;
        }
        a:hover { background:#2563eb; }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon"><i class="ph-fill ph-prohibit"></i></div>
        <h1>Access Denied</h1>
        <p>You don't have permission to view this portal.<br>
           Please log in with the correct role credentials.</p>
        <a href="/logout">← Switch Account</a>
    </div>
</body>
</html>
